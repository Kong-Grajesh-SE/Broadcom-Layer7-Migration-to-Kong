reference:
  id: assertion-type-catalog
  name: "Complete Layer 7 Assertion Type Catalog (247 types from Graphman v11.2.1)"
  description: "Authoritative list of all Layer 7 assertion types with their categories and Kong migration tier."
  source: "Graphman Client schema v11.2.1 + Layer 7 reference implementations"

  categories:
    structural:
      description: "Policy flow control — not individually migrated, inform Kong plugin ordering"
      types:
        - All  # AND logic (all children must pass)
        - OneOrMore  # OR logic (at least one child must pass)
        - ExactlyOne  # XOR logic
        - ConcurrentAll  # Parallel execution
        - HandleErrors  # Try-catch equivalent
        - Operation  # WSDL operation scoping
        - Transaction  # Transaction boundary
        - Unknown  # Unresolvable assertion

    direct:
      description: "1:1 Kong plugin mapping, auto-generated"
      count: 35
      types:
        - HttpBasic → basic-auth
        - HttpDigest → basic-auth
        - LookupApiKey → key-auth
        - ManageApiKey → key-auth
        - CORS → cors
        - RateLimit → rate-limiting
        - DistributedRateLimit → rate-limiting-advanced
        - RequestSizeLimit → request-size-limiting
        - RemoteIpRange → ip-restriction
        - HardcodedResponse → request-termination
        - EchoRoutingAssertion → request-termination
        - RaiseError → request-termination
        - AuditDetail → http-log
        - Audit → http-log
        - AuditRecordToXml → http-log
        - SnmpTrap → http-log
        - AddHeader → request-transformer
        - RemoveHeader → request-transformer
        - ContentType → request-transformer
        - Comment → _skip
        - True → _skip
        - False → _skip
        - MessageBuffering → _skip
        - BufferData → _skip
        - UUIDGenerator → pre-function
        - GeneratePassword → pre-function
        - GenerateSecurityHash → pre-function

