pattern:
  id: jwt-validation-claims
  name: "JWT Validation with Claim Checks"
  description: "Validates JWT Bearer token signature with gateway keys, then checks iss, aud, and scope claims via JSONPath"
  source: "Layer7-Community/Sample-Policies/Portal-Templates/Authentication/JWTValidation"
  layer7:
    assertion_types:
      - Regex
      - DecodeJsonWebToken
      - EvaluateJsonPathExpression
      - ComparisonAssertion
      - CustomizeErrorResponse
    config_keys:
      - expectedIssuer
      - expectedAudience
      - allowedScopes
      - KeyGoid  # gateway certificate reference for JWT verification
    flow: "extract_bearer → decode_jwt(key_lookup) → validate_iss → validate_aud → validate_scope"
    keywords:
      - jwt validation
      - bearer token
      - claim validation
      - issuer
      - audience
  kong:
    plugins:
      - name: jwt
        config:
          claims_to_verify:
            - exp
          key_claim_name: kid
          run_on_preflight: true
    requires_review: true
    review_notes:
      - "Map Layer 7 KeyGoid to Kong JWT consumer credentials"
      - "Issuer/audience claim validation may need post-function Lua or openid-connect plugin"
      - "Scope validation typically handled by openid-connect plugin scopes_required config"
  metadata:
    contributor: layer7-community-sample-policies
    confidence: 0.80
