pattern:
  id: cors-standard
  name: "Standard CORS Configuration"
  description: "CORS assertion with origins, methods, and headers"
  layer7:
    assertion_type: CorsAssertion
    config_keys:
      - accepted_origins
      - accepted_methods
      - accepted_headers
      - max_age
      - allow_credentials
    keywords:
      - cors
      - cross-origin
      - preflight
  kong:
    plugin: cors
    config:
      origins:
        - "*"
      methods:
        - GET
        - POST
        - PUT
        - DELETE
        - OPTIONS
      headers:
        - "*"
      max_age: 3600
      credentials: false
    requires_review: false
  metadata:
    contributor: seed
    confidence: 0.95
